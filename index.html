<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Terminal | 运维工具箱</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-wrapper {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 16px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-4px); }

        h3 {
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .info-item {
            font-size: 14px;
            margin: 10px 0;
            color: var(--text-dim);
        }

        .info-item span { color: var(--text-main); font-family: monospace; }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .link-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 13px;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tool-group {
            margin-top: 20px;
        }

        .tool-group label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-row input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: scale(1.05); }

        .res-box {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #10b981;
            min-height: 20px;
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>DASHBOARD</h1>
    <div class="search-wrapper">
        <input type="text" placeholder="键入关键词搜索或输入 URL 直达..." id="globalSearch">
    </div>
</header>

<div class="container">
    <div class="card">
        <h3>🛰️ NETWORK STATUS</h3>
        <div class="info-item">IPV4_ADDRESS: <span id="ip">FETCHING...</span></div>
        <div class="info-item">USER_AGENT: <span id="ua">IDENTIFYING...</span></div>
        <div class="info-item">LOCATION: <span id="loc">LOCATING...</span></div>
    </div>

    <div class="card">
        <h3>🚀 QUICK NAVIGATION</h3>
        <div class="links-grid">
            <a href="https://github.com" target="_blank" class="link-item">GitHub</a>
            <a href="https://cloudflare.com" target="_blank" class="link-item">CF</a>
            <a href="https://chatgpt.com" target="_blank" class="link-item">ChatGPT</a>
            <a href="https://v2ex.com" target="_blank" class="link-item">V2EX</a>
            <a href="https://youtube.com" target="_blank" class="link-item">YouTube</a>
            <a href="https://speedtest.net" target="_blank" class="link-item">Speed</a>
        </div>
    </div>

    <div class="card" style="grid-column: span 1;">
        <h3>🛠️ NETWORK TOOLS</h3>
        
        <div class="tool-group">
            <label>PING / LATENCY TEST</label>
            <div class="input-row">
                <input id="pingHost" placeholder="google.com">
                <button onclick="Tools.doPing()">TEST</button>
            </div>
            <div class="res-box" id="pingResult">READY</div>
        </div>

        <div class="tool-group">
            <label>DNS LOOKUP (A RECORD)</label>
            <div class="input-row">
                <input id="dnsHost" placeholder="apple.com">
                <button onclick="Tools.doDNS()">QUERY</button>
            </div>
            <div class="res-box" id="dnsResult">READY</div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
