<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Archives — 2026</title>
    <style>
        :root {
            --base-bg: #fafafa;
            --main-text: #1a1a1a;
            --sub-text: #999;
            --border: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--base-bg);
            color: var(--main-text);
            font-family: "Optima", "Didot", "Cormorant Garamond", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-container {
            width: 350px;
            text-align: left;
            padding: 40px;
            border: 1px solid var(--border);
            background: #fff;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        .subtitle {
            font-size: 10px;
            color: var(--sub-text);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .input-box {
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.4s;
            font-family: inherit;
        }

        .input-box:focus {
            border-bottom-color: var(--main-text);
        }

        button {
            background: var(--main-text);
            color: #fff;
            border: none;
            padding: 15px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.8;
        }

        footer {
            margin-top: 50px;
            font-size: 10px;
            color: var(--sub-text);
            line-height: 1.8;
        }

        .gallery-indicator {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: #d4af37; /* 哑金 */
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <header>
            <h1>Archives</h1>
            <div class="subtitle">PRIVATE COLLECTIONS — VOL. 12</div>
        </header>

        <div class="form-section">
            <input type="text" placeholder="Collection ID" id="cid" class="input-box">
            <input type="password" placeholder="Passcode" id="pwd" class="input-box">
            <button onclick="verify()">Enter Gallery</button>
        </div>

        <footer>
            <div id="msg"><span class="gallery-indicator"></span> System Online</div>
            <div>&copy; 2026 Studio Minimal. All rights reserved.</div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
