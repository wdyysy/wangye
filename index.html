<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Secure Access Gateway | Internal Management System</title>
    <link rel="icon" href="https://www.cloudflare.com/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #2563eb; /* 现代蓝色 */
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 复杂的背景纹理 (增加真实感) */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: -1;
        }

        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-svg {
            width: 50px;
            height: 50px;
            fill: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .sys-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        .sys-subtitle {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.25rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .login-btn:hover {
            background-color: #1d4ed8;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .footer-info {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        /* 密码输入错误时的动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="login-card" id="loginCard">
        <div class="logo-area">
            <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-3zm0 2.18l7 2.33v4.62c0 4.19-2.83 8.02-7 9.07-4.17-1.05-7-4.88-7-9.07V6.51l7-2.33zM12 7c-1.1 0-2 .9-2 2v2H9c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1h-1V9c0-1.1-.9-2-2-2zm0 2c.55 0 1 .45 1 1v1h-2v-1c0-.55.45-1 1-1z"/>
            </svg>
                <h1 class="sys-title">Secure Gateway</h1>
                <p class="sys-subtitle">Enter credentials to access internal system.</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label class="input-label" for="username">Access Key ID</label>
                <input class="input-field" type="text" id="username" autocomplete="username" placeholder="Enter key ID">
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Access Token</label>
                <input class="input-field" type="password" id="password" autocomplete="current-password" placeholder="Enter token">
            </div>
            <button class="login-btn" type="submit">Authorize Connection</button>
        </form>

        <div class="footer-info">
            &copy; <span id="year"></span> Edge Network Technologies. All rights reserved.<br>
            Strictly for authorized personnel.
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
