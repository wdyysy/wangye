<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Storage - Login</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 动态渐变背景 */
        .background {
            position: fixed;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(125deg, #2c3e50, #000000, #2980b9);
            background-size: 400% 400%;
            animation: Gradient 15s ease infinite;
            z-index: -1;
        }

        @keyframes Gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 毛玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            color: var(--text-color);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #2980b9;
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.4);
        }

        .footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="glass-card">
            <h2>PRIVATE CLOUD</h2>
            <div class="input-group">
                <input type="text" placeholder="Username" id="user">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" id="pass">
            </div>
            <button onclick="handleLogin()">Login</button>
            <div class="footer" id="status">Secure Storage System v2.4.0</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
